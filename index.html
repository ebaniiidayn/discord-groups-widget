<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Group Panel Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260525-1" />
  </head>
  <body>
    <main class="widget" aria-live="polite">
      <header class="widget-header">
        <div class="title-wrap">
          <span class="dot" aria-hidden="true"></span>
          <h1 id="widget-title">SQUADS</h1>
        </div>
        <p id="online-counter">0 online</p>
      </header>

      <section class="groups" id="groups"></section>

      <footer class="widget-footer">
        <span id="footer-label">Channel Groups</span>
      </footer>
    </main>

    <script src="./widget.js?v=20260525-1" defer></script>
  </body>
</html>
